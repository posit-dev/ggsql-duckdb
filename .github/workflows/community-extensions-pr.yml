# Opens a PR against duckdb/community-extensions whenever a GitHub Release is
# published, updating extensions/ggsql/description.yml to the new tag's SHA +
# version. community-extensions CI then builds, signs, and publishes the
# extension to community-extensions.duckdb.org.
#
# Prerequisites (one-time):
#   1. Fork duckdb/community-extensions under the org configured in COMMUNITY_FORK.
#   2. Create a fine-grained PAT with:
#        - contents:write on the fork (to push the branch)
#        - pull-requests:write on duckdb/community-extensions (to open the PR)
#      Save it as repo secret COMMUNITY_EXT_PAT.
#   3. Submit the initial extensions/ggsql/description.yml PR manually — after
#      that, this workflow handles subsequent version bumps.

name: community-extensions PR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (e.g. v0.1.0). Must already exist.
        required: true

permissions:
  contents: read

jobs:
  open-pr:
    runs-on: ubuntu-latest
    env:
      EXTENSION_NAME: ggsql
      COMMUNITY_FORK: posit-dev/community-extensions
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout extension repo at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Resolve commit SHA for tag
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Checkout duckdb/community-extensions
        uses: actions/checkout@v4
        with:
          repository: duckdb/community-extensions
          path: community-extensions
          token: ${{ secrets.COMMUNITY_EXT_PAT }}

      - name: Render description.yml
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          REF: ${{ steps.sha.outputs.sha }}
        run: |
          mkdir -p "community-extensions/extensions/${EXTENSION_NAME}"
          yq '.extension.version = strenv(VERSION) | .repo.ref = strenv(REF)' \
            community-extension.yml \
            > "community-extensions/extensions/${EXTENSION_NAME}/description.yml"
          cat "community-extensions/extensions/${EXTENSION_NAME}/description.yml"

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: community-extensions
          token: ${{ secrets.COMMUNITY_EXT_PAT }}
          push-to-fork: ${{ env.COMMUNITY_FORK }}
          branch: ${{ env.EXTENSION_NAME }}-${{ steps.tag.outputs.tag }}
          delete-branch: true
          commit-message: "${{ env.EXTENSION_NAME }}: ${{ steps.tag.outputs.tag }}"
          title: "${{ env.EXTENSION_NAME }}: ${{ steps.tag.outputs.tag }}"
          body: |
            Bump `${{ env.EXTENSION_NAME }}` to `${{ steps.tag.outputs.tag }}`.

            Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.tag }}
            Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.sha.outputs.sha }}
